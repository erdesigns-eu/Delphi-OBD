name: Feature request
description: Suggest a new feature, component, or catalogue addition
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening, please skim [`PLAN.md`](../PLAN.md). If the feature
        is already in scope for v1, tick the relevant box in your PR; if
        it's a scope change, this issue is the right place to discuss it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: User story shape — "as a developer building X I want Y so that Z".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Component name, properties, events, methods if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope impact
      options:
        - "Within v1 scope (already in PLAN.md)"
        - "Adds to v1 scope"
        - "Post-1.0"
        - "Not sure"
    validations:
      required: true

  - type: input
    id: spec
    attributes:
      label: Spec / standard reference
      description: ISO / SAE / OEM document that backs the request, if any.
