name: Question
description: Ask about usage, integration, or "is this supported?"
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: What have you tried?
      description: |
        Help us help you — paste what you've already attempted and the
        result. "I read the README" is fine; "I haven't looked yet" is not.
