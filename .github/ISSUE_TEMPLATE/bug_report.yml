name: Bug report
description: Something is broken or behaves incorrectly
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The more detail, the faster we can fix.

        For security issues affecting flashing or signature verification,
        do **not** file a public issue — see [SECURITY.md](../SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Minimal sample project welcome.
      placeholder: |
        1. Drop TOBDConnection on a form
        2. Set Transport := otSerial, SerialSettings.Port := 'COM3'
        3. Set Active := True
        4. Observe …
    validations:
      required: true

  - type: input
    id: delphi-version
    attributes:
      label: Delphi version
      placeholder: "12 Athens / 11 Alexandria / 10.4 Sydney / 10.3 Rio"
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Delphi-OBD version
      placeholder: "v2.0.0-alpha.X / commit hash"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 24H2 / Windows 10 22H2"
    validations:
      required: true

  - type: input
    id: adapter
    attributes:
      label: Adapter (chip + firmware)
      description: If hardware is involved.
      placeholder: "ELM327 v1.5 clone / OBDLink MX+ / J2534 PassThru"

  - type: input
    id: vehicle
    attributes:
      label: Vehicle (year, make, model, ECU)
      description: If hardware is involved.

  - type: textarea
    id: log
    attributes:
      label: Captured log
      description: |
        A `.obdlog` capture from `TOBDRecorder` is the gold standard.
        Attach the file or paste a relevant excerpt.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
