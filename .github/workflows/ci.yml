#-------------------------------------------------------------------------------
#  ci.yml — Delphi-OBD continuous integration
#
#  Builds DelphiOBD_RT.dpk and DelphiOBD_DT.dpk and runs the DUnitX test
#  suite on every supported Delphi version. Uploads coverage and JUnit
#  artefacts.
#
#  Required runner: a Windows runner with RAD Studio installed. The
#  default config below assumes self-hosted runners labelled
#  'rad-studio-12', 'rad-studio-11', 'rad-studio-10.4', 'rad-studio-10.3'.
#  The Windows-build job is gated off until a runner is wired up; the
#  hygiene job runs on every push so style and JSON catalogues are
#  validated from day one.
#-------------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main, v2, 'v2/**']
  pull_request:
    branches: [v2]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  guard:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: VCL/FMX guard on runtime units
        run: |
          set -e
          # Runtime units must not depend on Vcl.* or FMX.*. The IDE-only
          # design-time package is the single exception.
          dirs="src/Core src/Connection src/Adapter src/Protocol src/Services"
          violations=""
          for d in $dirs; do
            if [ -d "$d" ]; then
              found=$(grep -RInE 'uses[^;]*\b(Vcl|FMX)\.' "$d" 2>/dev/null || true)
              if [ -n "$found" ]; then
                violations="$violations\n$found"
              fi
            fi
          done
          if [ -n "$violations" ]; then
            printf "Runtime unit references VCL/FMX:%b\n" "$violations"
            exit 1
          fi

      - name: File header presence on .pas files
        run: |
          set -e
          # Every .pas file must begin with the standard header marker.
          missing=""
          for f in $(find src tests -name '*.pas' 2>/dev/null); do
            if ! head -1 "$f" | grep -q "^//-\{20,\}"; then
              missing="$missing\n$f"
            fi
          done
          if [ -n "$missing" ]; then
            printf "Missing file header:%b\n" "$missing"
            exit 1
          fi

      - name: JSON catalogue lint
        run: |
          set -e
          # All catalogue files must parse as JSON.
          if [ -d catalogs ]; then
            find catalogs -name '*.json' -print0 \
              | xargs -0 -n1 -I{} python3 -c "import json,sys; json.load(open('{}'))"
          fi

  build:
    name: Build & test (Delphi ${{ matrix.delphi }})
    needs: [guard]
    # Phase 0: build matrix is configured but the job is gated off until
    # self-hosted Windows runners with RAD Studio are wired up. See
    # packages/README.md for runner setup notes.
    if: false
    runs-on: [self-hosted, windows, 'rad-studio-${{ matrix.delphi }}']
    strategy:
      fail-fast: false
      matrix:
        delphi: ['12', '11', '10.4', '10.3']
    steps:
      - uses: actions/checkout@v4

      - name: Build runtime package
        shell: cmd
        run: |
          msbuild packages\DelphiOBD_RT.dproj /t:Build ^
            /p:Config=Release /p:Platform=Win32

      - name: Build design-time package
        shell: cmd
        run: |
          msbuild packages\DelphiOBD_DT.dproj /t:Build ^
            /p:Config=Release /p:Platform=Win32

      - name: Build & run DUnitX tests
        shell: cmd
        run: |
          msbuild tests\DelphiOBD_Tests.dproj /t:Build ^
            /p:Config=Release /p:Platform=Win32 /p:DefineConstants=CI
          tests\Win32\Release\DelphiOBD_Tests.exe ^
            --xmloutput=tests\nunit-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nunit-results-${{ matrix.delphi }}
          path: tests/nunit-results.xml

      - name: Run code-coverage (DelphiCodeCoverage)
        shell: cmd
        run: |
          if exist tools\coverage\run-coverage.cmd (
            tools\coverage\run-coverage.cmd
          )

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.delphi }}
          path: tools/coverage/output/
