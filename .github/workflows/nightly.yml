name: Nightly

on:
  schedule:
    # 02:30 UTC every day — quiet for both EU and US contributor timezones.
    - cron: '30 2 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Full lint pass (same checks as CI lint, but kept separate so failures
  # don't gate PRs — nightly is a "trend" check, not a merge gate).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run all static checks
        run: |
          set -euo pipefail
          ! grep -rnE 'function T[A-Za-z0-9]+function T|procedure T[A-Za-z0-9]+procedure T' src/ examples/
          ! grep -rnE '(^|[^A-Za-z])Redraw;' src/ | grep -v 'NeedRedraw'
          ! grep -rnE 'FBackBuffer|FBackBufferImage|InvalidateBackBuffer' src/

  # Extended Delphi build covering both Win32 and Win64. Self-hosted only;
  # gated off until a runner is registered.
  build-extended:
    needs: lint
    if: false
    strategy:
      fail-fast: false
      matrix:
        delphi: ['11', '12']
        platform: [Win32, Win64]
    runs-on: [self-hosted, windows, delphi-${{ matrix.delphi }}]
    steps:
      - uses: actions/checkout@v4

      - name: Build packages (${{ matrix.platform }})
        shell: cmd
        run: |
          call "%RSVARSDIR%\rsvars.bat"
          msbuild Packages\RunTime.dproj   /t:Build /p:Config=Release /p:Platform=${{ matrix.platform }}
          msbuild Packages\DesignTime.dproj /t:Build /p:Config=Release /p:Platform=${{ matrix.platform }}

      - name: Compile every example (${{ matrix.platform }})
        shell: cmd
        run: |
          call "%RSVARSDIR%\rsvars.bat"
          for /R examples %%f in (*.dpr) do dcc32 -B "%%f"

      - name: Compile + run extended test suite
        shell: cmd
        run: |
          call "%RSVARSDIR%\rsvars.bat"
          dcc32 -B tests\Tests.dpr
          tests\Tests.exe

      - name: Upload NUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-tests-${{ matrix.delphi }}-${{ matrix.platform }}
          path: tests/TestResults.xml
